services:
  writer:
    build: .
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./data:/data
    command:
      - --mqtt-host
      - localhost
      - --topic
      - meshair/nodes/+/telemetry
      - --jsonl
      - /data/airquality.jsonl
      - --db
      - /data/meshair.db

  web:
    build: .
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./data:/data
    entrypoint:
      - python
      - web.py
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8055"
      - --db
      - /data/meshair.db
